<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>처음 시작하기</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="signup">
  <main class="signup-wrap">
    <section class="signup-card">
      <div class="signup-badge">START</div>
      <h1>처음 시작하기</h1>
      <p class="subtext center">학번과 학과를 입력하면 시작할 수 있습니다.</p>

      <div class="field">
        <label for="studentIdInput">학번</label>
        <input type="text" id="studentIdInput" maxlength="8" inputmode="numeric" placeholder="8자리 숫자 입력" />
        <small class="helper-text">앞 4자리는 입학년도입니다. 예: 20251234</small>
      </div>

      <div class="field">
        <label for="departmentInput">학과</label>
        <select id="departmentInput"></select>
      </div>

      <button id="startBtn" class="primary-btn full" type="button">시작하기</button>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
